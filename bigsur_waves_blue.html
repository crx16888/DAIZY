
<div style="position:relative;width:100%;aspect-ratio:16/10;max-height:560px;border-radius:var(--border-radius-lg);overflow:hidden;">
  <canvas id="c" style="width:100%;height:100%;display:block;"></canvas>
</div>
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:1rem;">
  <div>
    <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
      <label style="font-size:13px;color:var(--color-text-secondary);">Blur</label>
      <span id="bV" style="font-size:13px;font-weight:500;">50%</span>
    </div>
    <input type="range" min="1" max="100" value="50" id="bS" step="1" style="width:100%;" />
  </div>
  <div>
    <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
      <label style="font-size:13px;color:var(--color-text-secondary);">Amplitude</label>
      <span id="aV" style="font-size:13px;font-weight:500;">60%</span>
    </div>
    <input type="range" min="10" max="100" value="60" id="aS" step="1" style="width:100%;" />
  </div>
  <div>
    <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
      <label style="font-size:13px;color:var(--color-text-secondary);">Offset</label>
      <span id="oV" style="font-size:13px;font-weight:500;">35%</span>
    </div>
    <input type="range" min="0" max="80" value="35" id="oS" step="1" style="width:100%;" />
  </div>
  <div>
    <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
      <label style="font-size:13px;color:var(--color-text-secondary);">Rotation</label>
      <span id="rV" style="font-size:13px;font-weight:500;">20°</span>
    </div>
    <input type="range" min="0" max="45" value="20" id="rS" step="1" style="width:100%;" />
  </div>
  <div>
    <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
      <label style="font-size:13px;color:var(--color-text-secondary);">Speed</label>
      <span id="sV" style="font-size:13px;font-weight:500;">35%</span>
    </div>
    <input type="range" min="1" max="100" value="35" id="sS" step="1" style="width:100%;" />
  </div>
</div>
<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
const bS=document.getElementById('bS'),bV=document.getElementById('bV');
const aS=document.getElementById('aS'),aV=document.getElementById('aV');
const oS=document.getElementById('oS'),oV=document.getElementById('oV');
const rS=document.getElementById('rS'),rV=document.getElementById('rV');
const sS=document.getElementById('sS'),sV=document.getElementById('sV');
let W,H,t=0;
const dpr=Math.min(devicePixelRatio,2);

function resize(){
  const r=c.parentElement.getBoundingClientRect();
  W=r.width;H=r.height;
  c.width=W*dpr;c.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

const baseY=[0,0.055,0.11,0.165,0.22,0.275,0.33,0.39,0.45,0.52];
const colors=[
  ['#000000','#020410'],
  ['#020410','#060A22'],
  ['#060A22','#0C1540'],
  ['#0C1540','#142468'],
  ['#142468','#1E38A0'],
  ['#1E38A0','#2850C8'],
  ['#2850C8','#3A6ADC'],
  ['#3A6ADC','#5888E8'],
  ['#5888E8','#80A8F0'],
  ['#80A8F0','#A8C4F8'],
];
const amps=[0.06,0.055,0.065,0.05,0.06,0.055,0.048,0.042,0.035,0.03];
const spds=[0.13,0.16,0.14,0.18,0.15,0.17,0.19,0.14,0.12,0.11];

const SEGS=5;
const N=baseY.length;

function waveY(xN,yB,amp,idx,ampMul,eH){
  const p=t*spds[idx]+idx*0.8;
  return yB*eH
    +Math.sin(xN*Math.PI*1.6+p)*amp*ampMul*eH
    +Math.sin(xN*Math.PI*0.9-p*0.7+1.2)*amp*ampMul*eH*0.5;
}

function drawWave(yB,amp,ci,idx,ampMul,eW,eH,ox,oy){
  const pts=[];
  for(let i=0;i<=SEGS;i++){
    const xN=i/SEGS;
    pts.push({x:ox+xN*eW,y:oy+waveY(xN,yB,amp,idx,ampMul,eH)});
  }
  ctx.beginPath();
  ctx.moveTo(ox-80,oy+eH+80);
  ctx.lineTo(ox-80,pts[0].y);
  ctx.lineTo(pts[0].x,pts[0].y);
  for(let i=0;i<pts.length-1;i++){
    const p=pts[i],q=pts[i+1];
    ctx.bezierCurveTo(p.x+(q.x-p.x)*0.4,p.y,p.x+(q.x-p.x)*0.6,q.y,q.x,q.y);
  }
  ctx.lineTo(ox+eW+80,oy+eH+80);
  ctx.closePath();
  const topY=oy+yB*eH;
  const g=ctx.createLinearGradient(0,topY-eH*0.04,0,topY+eH*0.15);
  g.addColorStop(0,colors[ci][0]);
  g.addColorStop(1,colors[ci][1]);
  ctx.fillStyle=g;
  ctx.fill();
}

function draw(){
  const speed=0.2+(sS.value/100)*1.8;
  t+=0.005*speed;
  const blurPx=Math.round(Math.min(W,H)*(bS.value/100)*0.22);
  const ampMul=0.3+(aS.value/100)*1.4;
  const offset=oS.value/100;
  const angle=rS.value*Math.PI/180;

  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);

  const diag=Math.sqrt(W*W+H*H);
  const eW=diag*1.3;
  const eH=diag*1.3;
  const ox=(W-eW)/2;
  const oy=(H-eH)/2;

  ctx.save();
  ctx.translate(W/2,H/2);
  ctx.rotate(angle);
  ctx.translate(-W/2,-H/2);
  ctx.filter=blurPx>0?'blur('+blurPx+'px)':'none';
  ctx.fillStyle='#000';
  ctx.fillRect(ox-100,oy-100,eW+200,eH+200);

  for(let i=0;i<N;i++){
    const yB=offset+baseY[i];
    drawWave(yB,amps[i],i,i,ampMul,eW,eH,ox,oy);
  }

  ctx.filter='none';
  ctx.restore();
  requestAnimationFrame(draw);
}

bS.oninput=()=>{bV.textContent=bS.value+'%';};
aS.oninput=()=>{aV.textContent=aS.value+'%';};
oS.oninput=()=>{oV.textContent=oS.value+'%';};
rS.oninput=()=>{rV.textContent=rS.value+'°';};
sS.oninput=()=>{sV.textContent=sS.value+'%';};

resize();
window.addEventListener('resize',resize);
draw();
</script>
